<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>LiveUpdate POC</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">LiveUpdate POC</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <p class="build-label">Build: {{ buildNumber }}</p>
    <p class="greeting">{{ greeting }}</p>

    <ion-button
      expand="block"
      color="medium"
      [disabled]="!hasPrevious"
      (click)="rollBack()"
    >
      Roll Back
    </ion-button>
  </div>
</ion-content>
