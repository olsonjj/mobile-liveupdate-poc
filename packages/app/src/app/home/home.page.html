<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>LiveUpdate POC</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">LiveUpdate POC</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- "Updating…" overlay -->
  <div id="updating-overlay" *ngIf="isUpdating">
    <div id="updating-overlay-box">
      <ion-spinner name="crescent"></ion-spinner>
      <p id="updating-overlay-text">Updating&hellip;</p>
    </div>
  </div>

  <div id="container">
    <p class="build-label">Build: {{ buildNumber }}</p>
    <p class="greeting">{{ greeting }}</p>

    <!-- Version check info -->
    <div id="update-info" *ngIf="checkComplete; else checking">
      <p class="version-line">Local: {{ localVersion ?? '(none)' }}</p>
      <p class="version-line">Server: {{ serverVersion ?? '(unreachable)' }}</p>
      <p
        class="update-status"
        [class.available]="updateAvailable"
        [class.unavailable]="!updateAvailable"
      >
        {{ updateAvailable ? '✓ Update available' : '✗ Up to date' }}
      </p>
    </div>
    <ng-template #checking>
      <p class="version-line checking">Checking for updates…</p>
    </ng-template>

    <ion-button
      expand="block"
      color="medium"
      [disabled]="!hasPrevious"
      (click)="rollBack()"
    >
      Roll Back
    </ion-button>
  </div>
</ion-content>
